name: Android Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'AccelerometerApp/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'AccelerometerApp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --update
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-33;google_apis;x86_64"
          
      - name: Make gradlew executable
        run: chmod +x AccelerometerApp/gradlew
        
      - name: Build with Gradle
        working-directory: AccelerometerApp
        run: |
          ./gradlew :app:assembleDebug :app:testDebugUnitTest
        
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: accelerometer-app-debug
          path: AccelerometerApp/app/build/outputs/apk/debug/**/*.apk
          retention-days: 30
          
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: accelerometer-app-release
          path: AccelerometerApp/app/build/outputs/apk/release/**/*.apk
          retention-days: 30
          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: AccelerometerApp/app/build/reports/tests/**
          retention-days: 30
